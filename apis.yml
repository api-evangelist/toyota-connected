aid: toyota-connected
name: Toyota Connected
description: >-
  Toyota Connected is Toyota Motor Corporation's global connected mobility
  technology arm, building the data, telematics, and software platforms that
  power Toyota and Lexus connected vehicle services worldwide. The group
  operates as a federation of regional subsidiaries — TOYOTA Connected
  Corporation (Japan), Toyota Connected North America (TCNA, Plano, Texas),
  TOYOTA Connected Europe (TCEU, United Kingdom), TOYOTA Connected India
  (TCIN), TOYOTA Connected Asia Pacific, and Toyota Tsusho Connected Middle
  East — and runs Toyota's Mobility Service Platform (MSPF) and the
  Drivelink telematics backbone behind Safety Connect, Service Connect,
  Remote Connect, Destination Assist, Wi-Fi Connect, and the "Hey Toyota"
  in-vehicle voice assistant. TCNA reports surpassing five million connected
  customer calls across Toyota and Lexus and runs Toyota's Big Data Center
  for connected-vehicle data. KINTO — Toyota's mobility services brand for
  car subscription, car-sharing, ride-hailing, and carpooling (KINTO One,
  KINTO Flex, KINTO Share, KINTO Ride, KINTO Join) — sits adjacent in
  Toyota's mobility portfolio and is powered by KINTO Technologies on AWS.
  Toyota exposes developer portals at developer.eig.toyota.com (Toyota API
  Portal covering TMC, TMNA, TEMA, TFS, NAMC, and other entities) and
  developer.toyotaconnected.eu (Toyota Connected EU API services, including
  Telematics and Vehicle APIs documented with Swagger/OpenAPI), but access
  is gated to partners and internal Toyota teams — no public, unauthenticated
  OpenAPI specifications are published. Third-party access to Toyota
  vehicle data for individual developers is typically brokered through
  partners such as Smartcar and High Mobility rather than directly via
  Toyota's own portals.
